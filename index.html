<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Pro System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f4f6f9;
  transition:0.3s;
}

.container{
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  width:240px;
  background:#111;
  color:#fff;
  padding:20px;
}

.sidebar h2{
  color:#00d4ff;
  margin-bottom:20px;
}

.sidebar ul{
  list-style:none;
}

.sidebar ul li{
  padding:12px;
  margin:8px 0;
  cursor:pointer;
  border-radius:8px;
}

.sidebar ul li:hover,
.sidebar ul li.active{
  background:#333;
}

/* Main */
.main{
  flex:1;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.topbar input{
  padding:8px;
  width:220px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* Sections */
.section{display:none;}
.section.active{display:block;}

/* Cards */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
}

/* Box */
.box{
  background:#fff;
  padding:20px;
  border-radius:12px;
}

/* Table */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
}

/* Buttons */
button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#111;
  color:#fff;
  margin-top:10px;
}

/* Dark */
.dark{
  background:#1b1b1b;
  color:#fff;
}

.dark .card,
.dark .box{
  background:#2a2a2a;
}

.dark table{
  color:#fff;
}

.dark input{
  background:#333;
  color:#fff;
}
</style>

</head>
<body>

<div class="container">

<!-- Sidebar -->
<div class="sidebar">
  <h2>Admin</h2>
  <ul>
    <li class="active" onclick="show('dashboard')">Dashboard</li>
    <li onclick="show('products')">Products</li>
    <li onclick="show('orders')">Orders</li>
    <li onclick="show('users')">Users</li>
  </ul>
</div>

<!-- Main -->
<div class="main">

<div class="topbar">
  <h2>Control Panel</h2>
  <div>
    <input type="text" placeholder="Search..." onkeyup="searchAll(this.value)">
    <button onclick="document.body.classList.toggle('dark')">🌙</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
  <div class="cards">
    <div class="card"><h3>Users</h3><p id="userCount">0</p></div>
    <div class="card"><h3>Products</h3><p id="productCount">0</p></div>
    <div class="card"><h3>Orders</h3><p id="orderCount">0</p></div>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="section">
  <div class="box">
    <h3>Products</h3>
    <table id="productsTable"></table>
    <button onclick="addProduct()">➕ Add Product</button>
  </div>
</div>

<!-- ORDERS -->
<div id="orders" class="section">
  <div class="box">
    <h3>Orders</h3>
    <table id="ordersTable"></table>
    <button onclick="addOrder()">➕ Add Order</button>
  </div>
</div>

<!-- USERS -->
<div id="users" class="section">
  <div class="box">
    <h3>Users</h3>
    <table id="usersTable"></table>
    <button onclick="addUser()">➕ Add User</button>
  </div>
</div>

</div>
</div>

<script>

/* ===== DATA ===== */
let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Phone", price:500},
  {name:"Laptop", price:1200}
];

let orders = JSON.parse(localStorage.getItem("orders")) || [
  {name:"Ali", product:"Phone", status:"Completed"},
  {name:"Omar", product:"Laptop", status:"Pending"}
];

let users = JSON.parse(localStorage.getItem("users")) || [
  {name:"Ahmed", email:"ahmed@gmail.com"},
  {name:"Sara", email:"sara@gmail.com"}
];

/* ===== SAVE ===== */
function save(){
  localStorage.setItem("products", JSON.stringify(products));
  localStorage.setItem("orders", JSON.stringify(orders));
  localStorage.setItem("users", JSON.stringify(users));
}

/* ===== RENDER ===== */
function render(){
  
  // products
  let pTable = "<tr><th>Name</th><th>Price</th></tr>";
  products.forEach(p=>{
    pTable += `<tr><td>${p.name}</td><td>$${p.price}</td></tr>`;
  });
  document.getElementById("productsTable").innerHTML = pTable;

  // orders
  let oTable = "<tr><th>Name</th><th>Product</th><th>Status</th></tr>";
  orders.forEach(o=>{
    oTable += `<tr><td>${o.name}</td><td>${o.product}</td><td>${o.status}</td></tr>`;
  });
  document.getElementById("ordersTable").innerHTML = oTable;

  // users
  let uTable = "<tr><th>Name</th><th>Email</th></tr>";
  users.forEach(u=>{
    uTable += `<tr><td>${u.name}</td><td>${u.email}</td></tr>`;
  });
  document.getElementById("usersTable").innerHTML = uTable;

  // counts
  document.getElementById("productCount").innerText = products.length;
  document.getElementById("orderCount").innerText = orders.length;
  document.getElementById("userCount").innerText = users.length;

  save();
}

/* ===== ADD ===== */
function addProduct(){
  products.push({name:"New Product", price:Math.floor(Math.random()*1000)});
  render();
}

function addOrder(){
  orders.push({name:"User", product:"Phone", status:"Pending"});
  render();
}

function addUser(){
  users.push({name:"New User", email:"user@gmail.com"});
  render();
}

/* ===== NAV ===== */
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ===== SEARCH ===== */
function searchAll(val){
  let rows = document.querySelectorAll("table tr");
  rows.forEach((r,i)=>{
    if(i===0) return;
    r.style.display = r.innerText.toLowerCase().includes(val.toLowerCase())
    ? "" : "none";
  });
}

/* INIT */
render();

</script>

</body>
</html>
